# ============================================================
# GitHub Actions CI/CD Pipeline
# Plastic Logbook System
# ============================================================
name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          JWT_SECRET: ci_test_jwt_secret_do_not_use_in_prod
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─────────────────────────────────────────────
  # Frontend Tests
  # ─────────────────────────────────────────────
  frontend-tests:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          CI: 'false'
        run: npm install

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          CI: true
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: ./frontend
        env:
          CI: 'false'
          GENERATE_SOURCEMAP: 'false'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm run build


  # ─────────────────────────────────────────────
  # Docker Build Check
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend Docker image
        run: |
          docker build ./backend \
            --file ./backend/Dockerfile \
            --target production \
            --tag abdulla33/logbook:backend-latest
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push abdulla33/logbook:backend-latest
          fi

      - name: Build and push frontend Docker image
        run: |
          docker build ./frontend \
            --file ./frontend/Dockerfile \
            --target production \
            --tag abdulla33/logbook:frontend-latest
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push abdulla33/logbook:frontend-latest
          fi

      - name: Verify images were created
        run: docker images | grep abdulla33
